<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#050816;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Background */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#112a6d 0%,#081126 40%,#050816 100%);
}

/* Floating particles */
.particle{
    position:absolute;
    border-radius:50%;
    background:rgba(100,170,255,.15);
    backdrop-filter:blur(5px);
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(120vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-20vh);
        opacity:0;
    }
}

/* Main panel */
.panel{
    width:min(92vw,700px);
    background:rgba(10,15,40,.88);
    backdrop-filter:blur(15px);
    border:1px solid rgba(0,150,255,.25);
    border-radius:24px;
    padding:24px;
    position:relative;
    z-index:10;

    box-shadow:
    0 0 30px rgba(0,120,255,.2),
    inset 0 0 20px rgba(255,255,255,.03);
}

/* Header */
.profile{
    width:46px;
    height:46px;
    border-radius:50%;
    background:#111;
    border:2px solid #2080ff;
    position:absolute;
    top:18px;
    left:18px;
}

.active-box{
    position:absolute;
    right:18px;
    top:18px;
    padding:8px 16px;
    border-radius:999px;
    border:2px solid #00bfff;
    color:#00d8ff;
    font-size:13px;
    font-weight:700;
}

.logo{
    text-align:center;
    color:#1875ff;
    font-size:42px;
    font-weight:900;
    margin-top:20px;
    letter-spacing:2px;
}

.line{
    width:130px;
    height:4px;
    background:#1875ff;
    margin:10px auto 25px;
    border-radius:20px;
    box-shadow:0 0 12px #1875ff;
}

/* Top card */
.card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px;
    border:2px solid #1875ff;
    border-radius:18px;
    margin-bottom:18px;
}

.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.icon{
    width:42px;
    height:42px;
    border-radius:50%;
    border:2px solid #1875ff;
}

.card-title{
    color:#ffc943;
    font-size:24px;
    font-weight:800;
}

.card-desc{
    color:#7db0ff;
    font-size:13px;
}

/* Tabs */
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    flex:1;
    text-align:center;
    padding:12px;
    border-radius:12px;
    font-weight:700;
}

.tab.orange{
    border:2px solid #ffb326;
    color:#ffb326;
}

.tab.blue{
    border:2px solid #1875ff;
    color:#1875ff;
}

/* Rows */
.row{
    height:58px;
    background:rgba(255,255,255,.03);
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 16px;
    margin-bottom:10px;
}

.name{
    color:white;
    font-weight:700;
}

.right{
    display:flex;
    align-items:center;
    gap:10px;
}

.status{
    width:35px;
    text-align:center;
    color:#aaa;
    font-weight:700;
}

/* Toggle */
.switch{
    width:54px;
    height:30px;
    border-radius:30px;
    background:#555;
    position:relative;
    cursor:pointer;
    transition:.25s;
}

.switch::before{
    content:"";
    position:absolute;
    width:22px;
    height:22px;
    border-radius:50%;
    background:#ffd25c;
    left:4px;
    top:4px;
    transition:.25s;
}

.switch.active{
    background:#0d7dff;
    box-shadow:0 0 15px #0d7dff;
}

.switch.active::before{
    left:28px;
    background:white;
}

/* Console */
.console{
    margin-top:15px;
    border:2px solid #1875ff;
    border-radius:16px;
    min-height:140px;
    padding:14px;
}

.console h3{
    color:#00d8ff;
    margin-bottom:8px;
    font-size:14px;
    letter-spacing:2px;
}

.console p{
    color:#00ff66;
    font-size:13px;
    line-height:1.7;
}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="panel">

<div class="profile"></div>

<div class="active-box" id="counter">
ACTIVE 0/7
</div>

<div class="logo">CONTROL</div>
<div class="line"></div>

<div class="card">
    <div class="left">
        <div class="icon"></div>
        <div>
            <div class="card-title">TRUNG TÂM</div>
            <div class="card-desc">Bảng điều khiển giao diện</div>
        </div>
    </div>

    <div class="switch"></div>
</div>

<div class="tabs">
    <div class="tab orange">Chế độ thường</div>
    <div class="tab blue">Chế độ nâng cao</div>
</div>

<div class="row">
    <div class="name">TÙY CHỌN 1</div>
    <div class="right">
        <span class="status">OFF</span>
        <div class="switch"></div>
    </div>
</div>

<div class="row">
    <div class="name">TÙY CHỌN 2</div>
    <div class="right">
        <span class="status">OFF</span>
        <div class="switch"></div>
    </div>
</div>

<div class="row">
    <div class="name">TỐI ƯU GIAO DIỆN</div>
    <div class="right">
        <span class="status">OFF</span>
        <div class="switch"></div>
    </div>
</div>

<div class="row">
    <div class="name">HIỆU ỨNG ĐỘNG</div>
    <div class="right">
        <span class="status">OFF</span>
        <div class="switch"></div>
    </div>
</div>

<div class="row">
    <div class="name">THÔNG BÁO</div>
    <div class="right">
        <span class="status">OFF</span>
        <div class="switch"></div>
    </div>
</div>

<div class="row">
    <div class="name">CHẾ ĐỘ BAN ĐÊM</div>
    <div class="right">
        <span class="status">OFF</span>
        <div class="switch"></div>
    </div>
</div>

<div class="console">
    <h3>SYSTEM LOG</h3>
    <p>> READY...</p>
</div>

</div>

<script>

/* Toggle logic */
const switches = document.querySelectorAll('.switch');
const counter = document.getElementById('counter');

function updateCounter(){
    const total =
    document.querySelectorAll('.switch.active').length;

    counter.innerHTML =
    `ACTIVE ${total}/${switches.length}`;
}

switches.forEach(sw=>{

    sw.addEventListener('click',()=>{

        sw.classList.toggle('active');

        const status =
        sw.parentElement.querySelector('.status');

        if(status){

            if(sw.classList.contains('active')){
                status.textContent='ON';
                status.style.color='#00ff66';
            }else{
                status.textContent='OFF';
                status.style.color='#aaa';
            }
        }

        updateCounter();
    });

});

updateCounter();

/* Particles */
const bg=document.getElementById('bg');

for(let i=0;i<45;i++){

    const p=document.createElement('div');

    p.className='particle';

    let size=Math.random()*20+6;

    p.style.width=size+'px';
    p.style.height=size+'px';

    p.style.left=Math.random()*100+'vw';

    p.style.animationDuration=
    (Math.random()*12+8)+'s';

    p.style.animationDelay=
    (-Math.random()*10)+'s';

    bg.appendChild(p);
}
</script>

</body>
</html>
